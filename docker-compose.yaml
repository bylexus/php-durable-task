services:
    db:
        image: postgres:17
        ports:
            - "5432:5432"
        environment:
            - POSTGRES_HOST_AUTH_METHOD=trust
            - POSTGRES_PASSWORD=${TEST_DATABASE_PASSWORD:-}
            - POSTGRES_USER=${TEST_DATABASE_USER:-postgres}
            - POSTGRES_DB=${TEST_DATABASE_NAME:-postgres}
        volumes:
            - testdb:/var/lib/postgresql/data

volumes:
  testdb: {}
