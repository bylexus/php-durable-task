services:
    php:
        build:
            context: docker/php
            dockerfile: Dockerfile
        command: ["tail", "-f", "/dev/null"]
        working_dir: /src
        env_file:
            - .env.docker
        volumes:
            - .:/src
    postgres:
        image: postgres:17
        ports:
            - "5432:5432"
        environment:
            - POSTGRES_HOST_AUTH_METHOD=trust
            - POSTGRES_PASSWORD=${PG_TEST_DATABASE_PASSWORD:-}
            - POSTGRES_USER=${PG_TEST_DATABASE_USER:-postgres}
            - POSTGRES_DB=${PG_TEST_DATABASE_NAME:-postgres}
        volumes:
            - testdb-postgres:/var/lib/postgresql/data
    mysql:
        image: mysql:8.0-oracle
        volumes:
            - testdb-mysql:/var/lib/mysql
        ports:
            - "3306:3306"
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_TEST_DATABASE_PASSWORD:-}
            MYSQL_DATABASE: ${MYSQL_TEST_DATABASE_NAME}
            MYSQL_USER: ${MYSQL_TEST_DATABASE_USER:-mysql}
            MYSQL_PASSWORD: ${MYSQL_TEST_DATABASE_PASSWORD:-}
    mariadb:
        image: mariadb:12-noble
        volumes:
            - testdb-mariadb:/var/lib/mysql
        ports:
            - "3307:3306"
        environment:
            MARIADB_ROOT_PASSWORD: ${MARIADB_TEST_DATABASE_PASSWORD:-}
            MARIADB_DATABASE: ${MARIADB_TEST_DATABASE_NAME}
            MARIADB_USER: ${MARIADB_TEST_DATABASE_USER:-mysql}
            MARIADB_PASSWORD: ${MARIADB_TEST_DATABASE_PASSWORD:-}
    mail:
        image: axllent/mailpit
        ports:
            - "8025:8025"
            - "1025:1025"

volumes:
    testdb-postgres: {}
    testdb-mysql: {}
    testdb-mariadb: {}
