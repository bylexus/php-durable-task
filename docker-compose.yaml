services:
    php:
        build:
            context: docker/php
            dockerfile: Dockerfile
        command: ["tail", "-f", "/dev/null"]
        working_dir: /src
        env_file:
            - .env.docker
        volumes:
            - .:/src
    postgres:
        image: postgres:17
        ports:
            - "5432:5432"
        environment:
            - POSTGRES_HOST_AUTH_METHOD=trust
            - POSTGRES_PASSWORD=${TEST_DATABASE_PASSWORD:-}
            - POSTGRES_USER=${TEST_DATABASE_USER:-postgres}
            - POSTGRES_DB=${TEST_DATABASE_NAME:-postgres}
        volumes:
            - testdb-postgres:/var/lib/postgresql/data
    mysql:
        image: mysql:8.0-oracle
        volumes:
            - testdb-mysql:/var/lib/mysql
        ports:
            - "3306:3306"
        environment:
            MYSQL_ROOT_PASSWORD: ${TEST_DATABASE_PASSWORD:-}
            MYSQL_DATABASE: ${TEST_DATABASE_NAME}
            MYSQL_USER: ${TEST_DATABASE_USER:-mysql}
            MYSQL_PASSWORD: ${TEST_DATABASE_PASSWORD:-}
    mail:
        image: axllent/mailpit
        ports:
            - "8025:8025"
            - "1025:1025"

volumes:
    testdb-postgres: {}
    testdb-mysql: {}
    testdb-mariadb: {}
